name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate google-config.js from secrets
        run: |
          cat > src/google-config.js << 'EOF'
          // Auto-generated by CI — do not edit manually
          export const GOOGLE_CLIENT_ID = '${{ secrets.GOOGLE_CLIENT_ID }}';
          export const GOOGLE_API_KEY   = '${{ secrets.GOOGLE_API_KEY }}';
          export const GOOGLE_SCOPES    = 'https://www.googleapis.com/auth/drive.file openid profile email';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
